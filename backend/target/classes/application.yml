server:
  port: 8080
  servlet:
    context-path: /api
spring:
  application:
    name: quju-backend
  datasource:
    url: ${QUJU_DB_URL:jdbc:mysql://localhost:3306/quju_dev?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${QUJU_DB_USERNAME:quju_app}
    password: ${QUJU_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
  mail:
    host: ${QUJU_SMTP_HOST:}
    port: ${QUJU_SMTP_PORT:587}
    username: ${QUJU_SMTP_USERNAME:}
    password: ${QUJU_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${QUJU_SMTP_AUTH:true}
          starttls:
            enable: ${QUJU_SMTP_STARTTLS:true}
quju:
  app:
    public-base-url: ${QUJU_PUBLIC_BASE_URL:http://localhost:5173}
    uploads-dir: ${QUJU_UPLOADS_DIR:../.build/uploads}
  mail:
    from: ${QUJU_MAIL_FROM:no-reply@quju.local}
  amap:
    key: ${QUJU_AMAP_WEB_SERVICE_KEY:}
  ai:
    base-url: ${QUJU_AI_BASE_URL:}
    api-key: ${QUJU_AI_API_KEY:}
    model: ${QUJU_AI_MODEL:gpt-4o-mini}
  s3:
    endpoint: ${QUJU_S3_ENDPOINT:}
    region: ${QUJU_S3_REGION:us-east-1}
    bucket: ${QUJU_S3_BUCKET:}
    access-key: ${QUJU_S3_ACCESS_KEY:}
    secret-key: ${QUJU_S3_SECRET_KEY:}
    public-base-url: ${QUJU_S3_PUBLIC_BASE_URL:}
logging:
  level:
    com.quju: info
